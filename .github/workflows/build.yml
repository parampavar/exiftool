name: Build & Test

on: [push, pull_request]

jobs:
  build:

    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]
        java: [ 11, 17, 21, 25 ]
        distribution: [ 'temurin' ]
        include:
          - os: windows-latest
            java: '8'
            distribution: 'zulu'
          - os: ubuntu-latest
            java: '8'
            distribution: 'zulu'
          - os: macos-latest
            java: '8'
            distribution: 'zulu'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          allow-unsafe-pr-checkout: false

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: ${{ matrix.distribution }}
          java-version: 25
          cache: 'maven'

      - name: Build
        run: |
          ./mvnw -version
          ./mvnw -B --color always install -DskipTests

      - name: Set up JDK ${{matrix.java}}
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: ${{ matrix.distribution }}
          java-version: ${{ matrix.java }}
          cache: 'maven'

      - name: Test
        run: |
          ./mvnw -version
          ./mvnw -B --color always verify
